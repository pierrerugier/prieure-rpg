<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Le Prieuré RPG — World Map</title>
<style>

body{background:#0a0a14;overflow:hidden;font-family:monospace;}
#ui{position:fixed;top:0;left:0;right:0;height:30px;background:#080d08;border-bottom:2px solid #1a3a1a;display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;}

<body>
<div id="ui"><h1>LE PRIEURÉ — CARTE DU MONDE</h1><div id="ctrl">ZQSD · Shift sprint · Molette zoom · Drag</div></div>
<div id="vp"><canvas id="mainCanvas"></canvas></div>
<canvas id="minimap" width="200" height="156"></canvas>
<div id="hud">Hameau du Prieuré</div>
<div id="zoomlabel">×2</div>
<script>
// ═══════════════════════════════════════════════════════════
// LE PRIEURÉ RPG — WORLD MAP
// 2560 × 2000 world px, tile 4px → 640×500 tiles
// ═══════════════════════════════════════════════════════════
const WW=2560, WH=2000;

const off = document.createElement('canvas');
off.width=WW; off.height=WH;
const g = off.getContext('2d');

// ── PALETTE (hardcoded hex, physical scene, no theme vars) ──
const P={
  fd:'#1c3810', fm:'#2a5018', fl:'#3a6824', fe:'#4a7830',
  tt:'#4e8c38', tb:'#60a848', ts:'#182c0c', th:'#5a7830',
  fw:'#78c045', fwl:'#88d050', fws:'#6ab038', fwd:'#58942c',
  gg:'#8ee450', ggl:'#a0f460', gge:'#78c83c',
  rg:'#52902e', rgd:'#448024',
  sd:'#e0d278', sdl:'#ece890', sdd:'#c8b860',
  pr:'#a8d878', prl:'#bcea8c', prd:'#90c060', law:'#98cc68',
  wa:'#3080b8', wal:'#48a0d8', was:'#68c0f0', wp:'#1460900',
  ro:'#ccc080', rod:'#aca060', roc:'#bab070', roe:'#8a7840',
  pt:'#b8a868', ptd:'#a09050',
  gr:'#b8b090', grd:'#a0987a',
  pk:'#727272', pkl:'#909090',
  as:'#c4a260', as2:'#b08840', ad:'#8a6030',
  ar:'#722810', ar2:'#541c08', arl:'#923820',
  aw:'#c8dff5', aw2:'#a8c8e8', aarch:'#3c1c04',
  vw:'#ddd0a5', vw2:'#ccc090', vr:'#886038', vr2:'#6a4420',
  vrl:'#a87848', vwi:'#b0d0e8', vdo:'#4e2c10', vwo:'#b09060',
  mw:'#e8dcc0', mw2:'#d8c8a8', mr:'#3a2858', mr2:'#281840',
  mrl:'#504878', mwi:'#a8c8e8', msh:'#245018',
  hr:'#b01010', hrl:'#d82020', hw:'#f0c0c0',
  hg:'#78b848', hh:'#2a5018',
  tc:'#c07238', tl:'#ffffff',
  fn:'#c8b870', he:'#2a5018', hel:'#3a6828',
  fp:'#d0d0d0', fr:'#d82020', fb:'#2848d0',
  tn:'#c07238',
};

// ── SEED RNG ──
let _s=12345;
function rng(){_s=Math.imul(_s^_s>>>13,_s|7);_s^=_s<<17;return(_s>>>0)/4294967296;}
function srng(x,y,i=0){_s=(x*73856093^y*19349663^i*1234567)>>>0;rng();return rng();}

// ── DRAW HELPERS ──
function fr2(x,y,w,h,c,s,sw=1,r=0){
  if(r){g.beginPath();g.roundRect(x,y,w,h,r);}
  if(c){g.fillStyle=c;r?g.fill():g.fillRect(x,y,w,h);}
  if(s){g.strokeStyle=s;g.lineWidth=sw;r?g.stroke():g.strokeRect(x,y,w,h);}
}
function el(cx,cy,rx,ry,c,s,sw=1,rot=0){
  g.beginPath();g.ellipse(cx,cy,rx,ry,rot,0,Math.PI*2);
  if(c){g.fillStyle=c;g.fill();}if(s){g.strokeStyle=s;g.lineWidth=sw;g.stroke();}
}
function ci(cx,cy,r,c,s,sw=1){g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);if(c){g.fillStyle=c;g.fill();}if(s){g.strokeStyle=s;g.lineWidth=sw;g.stroke();}}
function pl(pts,c,s,sw=1){
  g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);
  g.closePath();if(c){g.fillStyle=c;g.fill();}if(s){g.strokeStyle=s;g.lineWidth=sw;g.stroke();}
}
function cv(pts,sw,sc,fc=null){
  g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length-2;i++){
    const mx=(pts[i][0]+pts[i+1][0])/2,my=(pts[i][1]+pts[i+1][1])/2;
    g.quadraticCurveTo(pts[i][0],pts[i][1],mx,my);
  }
  const n=pts.length;
  g.quadraticCurveTo(pts[n-2][0],pts[n-2][1],pts[n-1][0],pts[n-1][1]);
  if(fc){g.fillStyle=fc;g.fill();}if(sc){g.strokeStyle=sc;g.lineWidth=sw;g.stroke();}
}
function road(pts,w){
  g.lineCap='round';g.lineJoin='round';
  g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);
  g.strokeStyle=P.roe;g.lineWidth=w+4;g.stroke();
  g.strokeStyle=P.ro;g.lineWidth=w;g.stroke();
  g.strokeStyle=P.roc+'88';g.lineWidth=w*0.4;g.stroke();
}
function path2(pts,w){
  g.lineCap='round';g.lineJoin='round';
  g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);
  g.strokeStyle=P.ptd;g.lineWidth=w+3;g.stroke();
  g.strokeStyle=P.pt;g.lineWidth=w;g.stroke();
}
function fairway(pts,w){
  g.lineCap='round';g.lineJoin='round';
  // rough fringe
  g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);
  g.strokeStyle=P.rgd;g.lineWidth=w+26;g.stroke();
  g.strokeStyle=P.rg;g.lineWidth=w+14;g.stroke();
  // fairway stripes
  for(let s2=0;s2<3;s2++){
    g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);
    g.strokeStyle=s2===0?P.fw:s2===1?P.fwl:P.fws;
    g.lineWidth=s2===0?w:s2===1?w*0.55:w*0.3;
    if(s2===2){g.setLineDash([12,10]);}
    g.stroke();g.setLineDash([]);
  }
}
function green(cx,cy,rx,ry,fc){
  el(cx,cy,rx+5,ry+5,P.gge,null);
  el(cx,cy,rx,ry,P.gg,null);
  el(cx,cy,rx*0.5,ry*0.45,P.ggl,null);
  ci(cx+rx*0.15,cy,5,P.gge);ci(cx+rx*0.15,cy,3.5,'#111');
  g.strokeStyle=P.fp;g.lineWidth=2;
  g.beginPath();g.moveTo(cx+rx*0.15,cy);g.lineTo(cx+rx*0.15,cy-28);g.stroke();
  pl([[cx+rx*0.15,cy-28],[cx+rx*0.15+14,cy-22],[cx+rx*0.15,cy-16]],fc||P.fr,null);
}
function bunker(cx,cy,rx,ry,rot=0){
  g.save();g.translate(cx,cy);g.rotate(rot);
  el(0,0,rx+2,ry+2,P.sdd,null);el(0,0,rx,ry,P.sd,null);el(0,0,rx*0.55,ry*0.5,P.sdl,null);
  g.restore();
}
function tree(cx,cy,r){
  g.fillStyle='#3a2010';g.fillRect(cx-1.5,cy+r*0.3,3,r*0.8);
  g.fillStyle=P.ts+'40';el(cx+r*0.25,cy+r*0.7,r*0.7,r*0.25,P.ts+'30',null);
  ci(cx,cy,r,P.tt);ci(cx-r*0.28,cy-r*0.05,r*0.72,P.tb);
  ci(cx+r*0.2,cy-r*0.15,r*0.58,P.tt);ci(cx,cy-r*0.28,r*0.48,P.tb);
  ci(cx-r*0.15,cy-r*0.25,r*0.22,'rgba(110,190,60,0.45)');
}

// ── ZONE LABELS helper ──
function zlabel(x,y,txt,col,bg='rgba(4,8,4,0.7)'){
  g.font='bold 16px monospace';g.textAlign='center';
  const tw=g.measureText(txt).width;
  fr2(x-tw/2-10,y-16,tw+20,22,bg,null,0,4);
  g.fillStyle='rgba(0,0,0,0.8)';g.fillText(txt,x+1,y+1);
  g.fillStyle=col;g.fillText(txt,x,y);
}
function alabel(x,y,txt,col,rot=0){
  g.save();g.translate(x,y);g.rotate(rot);
  g.font='11px monospace';g.textAlign='center';
  g.fillStyle='rgba(0,0,0,0.6)';g.fillText(txt,1,1);
  g.fillStyle=col;g.fillText(txt,0,0);
  g.restore();
}

// ════════════════════════════════════════════════════════════
// DRAW ORDER
// ════════════════════════════════════════════════════════════

// 1. BACKGROUND — forêt dense
fr2(0,0,WW,WH,P.fm);
for(let i=0;i<300;i++){
  const x=rng()*WW,y=rng()*WH,rx=25+rng()*80,ry=15+rng()*50;
  el(x,y,rx,ry,rng()<0.5?P.fd:P.fl,null);
}

// 2. ZONE PRAIRIE HAMEAU (haut-gauche)
// Calqué fidèlement sur la capture : forme organique
pl([[20,20],[380,20],[400,80],[380,160],[340,260],[290,380],[220,480],[140,560],
    [60,580],[20,520],[15,380],[10,200],[20,20]],P.pr,P.fe,2);
el(180,280,130,160,P.prl,null);
el(160,180,80,100,P.prl,null);

// Grande clairière centrale (Le Prieuré parking/cul-de-sac)
el(195,310,95,75,P.gr+'cc',P.grd,1);
el(195,310,82,62,P.gr,null);

// 3. ROUTES DU HAMEAU
// Allée des Fougères (verticale principale)
road([[140,20],[138,60],[142,120],[138,180],[136,240],[132,300],[128,380],[124,450],[120,550],[116,620]],11);
// Allée des Hameaux (gauche, secondaire)
path2([[55,100],[58,170],[60,250],[58,340],[55,430],[52,530],[50,610]],8);
// Allée de la Lisière (diagonale vers golf, se prolonge vers le club-house)
road([[210,30],[220,80],[232,140],[248,210],[268,290],[292,370],[320,450],[355,530],[395,610],[440,680],[490,740],[545,790]],13);
// Route interne Le Prieuré (boucle cul-de-sac)
path2([[195,310],[220,290],[250,285],[270,300],[265,330],[240,350],[210,345],[195,310]],7);
// Chemins transversaux
path2([[55,175],[90,172],[120,175],[140,178]],6);
path2([[55,340],[85,336],[115,338],[138,340]],6);
path2([[55,470],[90,466],[120,462],[130,460]],6);
// Connexion lisière → Fougères
path2([[220,200],[200,205],[175,208],[155,210],[138,210]],6);
path2([[260,340],[240,345],[215,348],[175,350],[148,352]],6);

// D130 (route principale en bas)
road([[0,1720],[120,1710],[280,1700],[450,1692],[620,1688],[800,1686],
      [1000,1688],[1200,1692],[1400,1698],[1600,1708],[1800,1720],[2000,1736],[2200,1750],[2560,1768]],22);
g.setLineDash([18,12]);g.strokeStyle='#d8c870';g.lineWidth=2;
g.beginPath();g.moveTo(0,1720);g.bezierCurveTo(640,1688,1280,1686,2560,1768);g.stroke();g.setLineDash([]);

// Route d'accès golf (D130 → club-house)
road([[860,1690],[850,1650],[840,1590],[835,1530],[832,1460],[830,1390],[828,1320],[825,1250],[820,1180]],16);

// ════════════════════════════════════════════════════════════
// MAISONS DU HAMEAU — TOUTES LES MAISONS
// Positions calquées fidèlement sur la capture OSM
// ════════════════════════════════════════════════════════════

// ── VILLAS PLAIN-PIED (allée Fougères / Hameaux) ──
// Style: lambris californien, plain-pied, ~120m2
// Jardin + haie autour de chaque maison
function drawVilla(cx,cy,w,h,rot,heroLabel,heroColor){
  g.save();g.translate(cx,cy);g.rotate(rot||0);
  const hw=w/2,hh=h/2;
  // Jardin
  fr2(-hw-14,-hh-12,w+28,h+24,P.hg,P.hh,1,4);
  // Haie
  for(let i=0;i<=4;i++){ci(-hw-10+i*(w+20)/4,-hh-10,5,P.he,P.hel,0.5);ci(-hw-10+i*(w+20)/4,hh+10,5,P.he,P.hel,0.5);}
  for(let i=1;i<3;i++){ci(-hw-10,-hh+i*h/3,4,P.he,P.hel,0.5);ci(hw+10,-hh+i*h/3,4,P.he,P.hel,0.5);}
  // Ombre
  g.fillStyle='rgba(0,0,0,0.18)';g.fillRect(-hw+3,hh-2,w,7);
  // Murs
  const wc=heroLabel?P.hw:P.vw, rc=heroLabel?P.hr:P.vr, rc2=heroLabel?P.hrl:P.vrl;
  fr2(-hw,-hh,w,h,wc,P.vwo,1.5);
  for(let i=1;i<4;i++){g.fillStyle=P.vw2+'66';g.fillRect(-hw,-hh+i*h/4,w,1.5);}
  // Toit
  pl([[-hw,-hh],[hw,-hh],[hw+5,-hh-10],[-hw-5,-hh-10]],rc2);
  pl([[-hw-5,-hh-10],[hw+5,-hh-10],[hw,-hh],[-hw,-hh]],rc);
  g.fillStyle=rc2;g.fillRect(-hw-5,-hh-11,w+10,2);
  // Fenêtres
  fr2(-hw+6,-hh+h*0.22,w*0.26,h*0.32,P.vwi,P.vwo,1);
  fr2(-hw+w*0.5,-hh+h*0.22,w*0.26,h*0.32,P.vwi,P.vwo,1);
  g.fillStyle=P.vwo;g.fillRect(-hw+6+w*0.13,-hh+h*0.22,1,h*0.32);g.fillRect(-hw+6,-hh+h*0.22+h*0.16,w*0.26,1);
  // Porte
  fr2(hw-w*0.32,-hh+h*0.42,w*0.22,h*0.56,P.vdo,P.vwo,1,2);
  ci(hw-w*0.14,-hh+h*0.68,1.8,'#c89030');
  // Allée
  fr2(-2,hh,4,16,P.gr,P.grd,0.5);
  g.restore();
  if(heroLabel){
    g.font='bold 10px monospace';g.textAlign='center';
    const cy2=cy-h/2-26;
    g.fillStyle='rgba(0,0,0,0.75)';g.fillText(heroLabel,cx+1,cy2+1);
    g.fillStyle=heroColor||'#ff5050';g.fillText(heroLabel,cx,cy2);
  }
}

// ── MANOIR À ÉTAGE (allée de la Lisière) ──
// Style IDF, 2 niveaux, volets verts, toit à deux pans
function drawManor(cx,cy,w,h,rot,heroLabel,heroColor){
  g.save();g.translate(cx,cy);g.rotate(rot||0);
  const hw=w/2,hh=h/2;
  // Grand jardin
  fr2(-hw-22,-hh-18,w+44,h+36,P.law,P.hh,1.5,5);
  for(let i=0;i<=6;i++){ci(-hw-18+i*(w+36)/6,-hh-15,7,P.hel,P.he,0.5);ci(-hw-18+i*(w+36)/6,hh+15,7,P.hel,P.he,0.5);}
  for(let i=1;i<4;i++){ci(-hw-16,-hh+i*h/4,6,P.hel,P.he,0.5);ci(hw+16,-hh+i*h/4,6,P.hel,P.he,0.5);}
  g.fillStyle='rgba(0,0,0,0.2)';g.fillRect(-hw+4,hh-3,w,9);
  const wc=heroLabel?P.hw:P.mw,rc=heroLabel?P.hr:P.mr,rc2=heroLabel?P.hrl:P.mrl;
  fr2(-hw,-hh,w,h,wc,P.mw2,2);
  g.fillStyle=P.mw2;g.fillRect(-hw,-hh+h*0.46,w,2.5);
  // Toit 2 pans
  pl([[-hw,-hh],[hw,-hh],[hw+6,-hh-14],[0,-hh-24],[-hw-6,-hh-14]],rc);
  pl([[0,-hh-24],[hw+6,-hh-14],[hw,-hh]],rc2);
  pl([[0,-hh-24],[-hw-6,-hh-14],[-hw,-hh]],rc);
  g.fillStyle=rc;g.fillRect(-hw-6,-hh-15,w+12,2);
  // Cheminée
  fr2(hw-18,-hh-28,10,20,P.as2,P.ad,1);fr2(hw-20,-hh-30,14,5,P.as,P.ad,1);
  // Fenêtres RDC (3)
  for(let i=0;i<3;i++){
    const fx=-hw+w*0.12+i*w*0.3;
    fr2(fx,-hh+h*0.54,w*0.18,h*0.34,P.mwi,P.mw2,1);
    fr2(fx-w*0.07,-hh+h*0.54,w*0.06,h*0.34,P.msh,null);
    fr2(fx+w*0.18,-hh+h*0.54,w*0.06,h*0.34,P.msh,null);
  }
  // Fenêtres étage (4)
  for(let i=0;i<4;i++){
    const fx=-hw+w*0.08+i*w*0.23;
    fr2(fx,-hh+h*0.1,w*0.15,h*0.3,P.mwi,P.mw2,1);
    fr2(fx-w*0.05,-hh+h*0.1,w*0.04,h*0.3,P.msh,null);
    fr2(fx+w*0.15,-hh+h*0.1,w*0.04,h*0.3,P.msh,null);
  }
  // Porte
  fr2(-w*0.1,-hh+h*0.54,w*0.2,h*0.45,P.vdo,P.mw2,1.5,3);
  ci(w*0.04,-hh+h*0.76,2.5,'#c89030');
  fr2(-3,hh,6,24,P.gr,P.grd,0.5);
  g.restore();
  if(heroLabel){
    g.font='bold 10px monospace';g.textAlign='center';
    const cy2=cy-h/2-34;
    g.fillStyle='rgba(0,0,0,0.75)';g.fillText(heroLabel,cx+1,cy2+1);
    g.fillStyle=heroColor||'#ff5050';g.fillText(heroLabel,cx,cy2);
  }
}

// ════════════════════════════════════════════════════════════

// ── ZONE CENTRALE "LE PRIEURÉ" (autour du cul-de-sac) ──

fr2(AX-82,AY+162,100,68,P.tc,P.ad,1.5);
g.strokeStyle=P.tl;g.lineWidth=2;g.strokeRect(AX-80,AY+164,96,64);

g.beginPath();g.moveTo(AX-32,AY+164);g.lineTo(AX-32,AY+228);g.stroke();
g.lineWidth=2.5;g.beginPath();g.moveTo(AX-80,AY+196);g.lineTo(AX+16,AY+196);g.stroke();
g.fillStyle='rgba(0,0,0,0.65)';g.font='9px monospace';g.textAlign='center';g.fillText('TENNIS',AX-32,AY+158);
g.fillStyle='#c07840';g.fillText('TENNIS',AX-32,AY+157);

zlabel(AX+54,AY-48,'CLUB-HOUSE','#ffd040');

// ════════════════════════════════════════════════════════════
// ARBRES — FORÊT ORGANIQUE
// ════════════════════════════════════════════════════════════
// Arbres sur les bords + entre les trous
const treeData=[];
// Bordure hameau (forêt qui cerne la prairie)
for(let a=0;a<Math.PI*2;a+=0.18){
  const r=220+srng(Math.cos(a)*100,Math.sin(a)*100)()*40;
  treeData.push([200+Math.cos(a)*r,310+Math.sin(a)*r*0.7,7+rng()*5]);
}
// Bandes de forêt entre les trous (Ouest)
for(let y=50;y<1700;y+=40){
  for(let x=GX+10;x<GX+850;x+=45){
    const v=srng(x,y)();
    if(v<0.22) treeData.push([x,GY+y,5+rng()*7]);
  }
}
// Forêt Est
for(let y=50;y<1700;y+=40){
  for(let x=EX+10;x<EX+850;x+=45){
    const v=srng(x+5000,y)();
    if(v<0.22) treeData.push([x,EY+y,5+rng()*7]);
  }
}
// Forêt entre Ouest et Est
for(let y=0;y<1800;y+=35){
  for(let x=GX+840;x<EX;x+=38){
    const v=srng(x+2000,y)();
    if(v<0.35) treeData.push([x,y,5+rng()*8]);
  }
}
// Bord gauche
for(let y=0;y<1800;y+=32){
  for(let x=0;x<GX-10;x+=35){
    if(x>420&&x<480) continue;
    const v=srng(x+100,y+100)();
    if(v<0.28) treeData.push([x,y,5+rng()*7]);
  }
}
// Bord droit
for(let y=0;y<1800;y+=32){
  for(let x=EX+840;x<WW;x+=35){
    const v=srng(x+9000,y)();
    if(v<0.32) treeData.push([x,y,5+rng()*7]);
  }
}
// Bas de carte
for(let y=1720;y<WH;y+=28){
  for(let x=0;x<WW;x+=30){
    const v=srng(x,y+5000)();
    if(v<0.4) treeData.push([x,y,4+rng()*6]);
  }
}
treeData.forEach(([x,y,r])=>tree(x,y,r));

// ════════════════════════════════════════════════════════════
// PIXEL-ART PASS
// Sample offscreen → basse résolution → upscale pixelisé
// ════════════════════════════════════════════════════════════
const TILE=4;
const PW2=Math.floor(WW/TILE), PH2=Math.floor(WH/TILE);
const tmp=document.createElement('canvas');
tmp.width=PW2;tmp.height=PH2;
const tc2=tmp.getContext('2d');
tc2.imageSmoothingEnabled=false;
tc2.drawImage(off,0,0,PW2,PH2);

const pix=document.createElement('canvas');
pix.width=WW;pix.height=WH;
const pc2=pix.getContext('2d');
pc2.imageSmoothingEnabled=false;
pc2.drawImage(tmp,0,0,PW2,PH2,0,0,WW,WH);

// ════════════════════════════════════════════════════════════
// DISPLAY + NAVIGATION
// ════════════════════════════════════════════════════════════
const VW=window.innerWidth, VH=window.innerHeight-30;
const mc=document.getElementById('mainCanvas');
mc.width=WW;mc.height=WH;
const mctx=mc.getContext('2d');
mctx.imageSmoothingEnabled=false;
mctx.drawImage(pix,0,0);

let zoom=2, sx=0, sy=0;
function clamp(){sx=Math.max(0,Math.min(sx,WW*zoom-VW));sy=Math.max(0,Math.min(sy,WH*zoom-VH));}
function applyView(){mc.style.width=(WW*zoom)+'px';mc.style.height=(WH*zoom)+'px';mc.style.left=-sx+'px';mc.style.top=-sy+'px';document.getElementById('zoomlabel').textContent='×'+zoom.toFixed(1);drawMM();updateHUD();}

const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
let spd=8;
(function loop(){
  let dx=0,dy=0;
  spd=keys['Shift']?20:8;
  if(keys['ArrowLeft']||keys['q']||keys['Q'])dx=-spd;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx=spd;
  if(keys['ArrowUp']||keys['z']||keys['Z'])dy=-spd;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy=spd;
  if(dx||dy){sx+=dx;sy+=dy;clamp();applyView();}
  requestAnimationFrame(loop);
})();

document.addEventListener('wheel',e=>{
  e.preventDefault();
  const oz=zoom;zoom=Math.max(0.5,Math.min(8,zoom+Math.sign(-e.deltaY)*0.3));
  const vp2=document.getElementById('vp').getBoundingClientRect();
  const mx=e.clientX-vp2.left,my=e.clientY-vp2.top;
  sx=(sx+mx)/oz*zoom-mx;sy=(sy+my)/oz*zoom-my;
  clamp();applyView();
},{passive:false});

let drag=false,dsx=0,dsy=0,dcx=0,dcy=0;
document.addEventListener('mousedown',e=>{drag=true;dsx=e.clientX;dsy=e.clientY;dcx=sx;dcy=sy;});
document.addEventListener('mousemove',e=>{if(!drag)return;sx=dcx-(e.clientX-dsx);sy=dcy-(e.clientY-dsy);clamp();applyView();});
document.addEventListener('mouseup',()=>drag=false);

const mm=document.getElementById('minimap');
const mmc=mm.getContext('2d');
function drawMM(){
  mmc.imageSmoothingEnabled=false;
  mmc.drawImage(pix,0,0,mm.width,mm.height);
  const scx=mm.width/WW,scy=mm.height/WH;
  const vx=(sx/zoom)*scx,vy=(sy/zoom)*scy,vw=(VW/zoom)*scx,vh=(VH/zoom)*scy;
  mmc.strokeStyle='rgba(255,255,255,0.9)';mmc.lineWidth=1.5;mmc.strokeRect(vx,vy,vw,vh);
  mmc.strokeStyle='rgba(255,255,0,0.5)';mmc.lineWidth=0.5;mmc.strokeRect(vx,vy,vw,vh);
}
drawMM();

function updateHUD(){
  const wx=sx/zoom+VW/(2*zoom),wy=sy/zoom+VH/(2*zoom);
  let z='Golf du Prieuré';
  if(wx<430&&wy<650)z='Hameau du Prieuré';
  else if(wx>AX-120&&wx<AX+350&&wy>AY-250&&wy<AY+250)z='Club-House — Abbaye du Prieuré';
  else if(wx>AX+150&&wy<AY-50)z='Piscine & Practice';
  else if(wx>EX+180&&wy<EY+130)z='Rue des Bonnes Joies — Evenou';
  else if(wx>EX)z='Parcours Est';
  else if(wx>GX)z='Parcours Ouest';
  else if(wy>1680)z='Route D130';
  document.getElementById('hud').textContent=z;
}
applyView();
</script>
